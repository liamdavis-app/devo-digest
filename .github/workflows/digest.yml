name: Daily Devolution Digest

on:
  schedule:
    # 07:15 UTC daily. GitHub cron is UTC — this is 07:15 GMT / 08:15 BST.
    # Adjust the time here if you want it earlier/later.
    - cron: "15 7 * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab to test

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: node digest.js
